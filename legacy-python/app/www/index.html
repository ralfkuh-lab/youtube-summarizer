<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Summarizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>YouTube Summarizer</h1>
    <div class="header-right">
      <button id="settingsBtn" class="icon-btn" title="Einstellungen">⚙</button>
    </div>
  </header>

  <div id="add-bar">
    <input type="text" id="urlInput" placeholder="YouTube-URL oder Video-ID eingeben..." />
    <button id="addBtn">+ Hinzufügen</button>
  </div>

  <div id="main">
    <aside id="sidebar">
      <div id="videoList"></div>
    </aside>
    <section id="detail">
      <div id="detailPlaceholder">Wähle ein Video aus der Liste</div>
      <div id="detailContent" style="display:none">
        <div id="detailHeader">
          <img id="detailThumb" src="" alt="" />
          <div>
            <h2 id="detailTitle"></h2>
            <a id="detailUrl" href="#" target="_blank"></a>
          </div>
          <button id="deleteBtn" title="Video entfernen">🗑</button>
        </div>
        <div id="tabBar">
          <button class="tab active" data-tab="transcript">Transkript</button>
          <button class="tab" data-tab="summary">Zusammenfassung</button>
          <button class="tab" data-tab="video">Video</button>
          <button id="summarizeBtn">Zusammenfassen lassen</button>
        </div>
        <div id="tabContent">
          <div id="tabTranscript" class="tab-panel active"></div>
          <div id="tabSummary" class="tab-panel"></div>
          <div id="tabVideo" class="tab-panel">
            <iframe id="videoPlayer" src="" allow="autoplay; encrypted-media; picture-in-picture; fullscreen"></iframe>
          </div>
        </div>
      </div>
      <div id="chaptersPanel" class="chapters-panel" style="display:none">
        <h3>Kapitel</h3>
        <div id="chaptersList"></div>
      </div>
    </section>
  </div>

  <footer id="statusBar">
    <span id="statusText">Bereit</span>
    <span id="statusModel"></span>
  </footer>
</div>

<div id="settingsModal" class="modal" style="display:none">
  <div class="modal-content">
    <h2>KI-Einstellungen</h2>
    <label>Provider
      <select id="configProvider">
        <option value="opencode_go">OpenCode Go</option>
        <option value="opencode_zen">OpenCode Zen</option>
        <option value="openrouter">OpenRouter</option>
        <option value="ollama">Ollama (lokal)</option>
      </select>
    </label>
    <label>API-Key
      <input type="password" id="configApiKey" />
    </label>
    <label>Modell
      <input type="text" id="configModel" placeholder="z.B. qwen3.5-plus" />
    </label>
    <div class="modal-actions">
      <button id="configSave">Speichern</button>
      <button id="configCancel">Abbrechen</button>
    </div>
  </div>
</div>

<div id="summaryModal" class="modal" style="display:none">
  <div class="modal-content modal-wide">
    <h2>Zusammenfassung konfigurieren</h2>
    <div class="summary-row">
      <label>Detailgrad
        <select id="summaryDetail">
          <option value="short">Kurz (Stichpunkte)</option>
          <option value="medium" selected>Mittel</option>
          <option value="detailed">Ausführlich</option>
        </select>
      </label>
      <label>Sprache
        <select id="summaryLang">
          <option value="original">Original (wie Transkript)</option>
          <option value="german">Deutsch</option>
          <option value="english">English</option>
          <option value="french">Français</option>
          <option value="spanish">Español</option>
          <option value="italian">Italiano</option>
        </select>
      </label>
      <label>Chapters nutzen
        <select id="summaryUseChapters">
          <option value="yes">Ja, Zusammenfassung je Kapitel gliedern</option>
          <option value="no">Nein</option>
        </select>
      </label>
    </div>
    <label>Prompt
      <textarea id="summaryPrompt" rows="8"></textarea>
    </label>
    <div class="modal-actions">
      <button id="summaryStart">Zusammenfassen</button>
      <button id="summaryCancel">Abbrechen</button>
    </div>
  </div>
</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
